  <line x1="230" y1="210" x2="230" y2="250" stroke="#666" stroke-width="1" opacity="0.4"/>
  <line x1="260" y1="210" x2="260" y2="250" stroke="#666" stroke-width="1" opacity="0.4"/>
  <line x1="290" y1="210" x2="290" y2="250" stroke="#666" stroke-width="1" opacity="0.4"/>
  <line x1="320" y1="210" x2="320" y2="250" stroke="#666" stroke-width="1" opacity="0.4"/>
