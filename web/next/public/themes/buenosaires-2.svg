<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="ba2_sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1A5AA8"/><stop offset="100%" stop-color="#4A8AE0"/></linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#ba2_sky)"/>
  <!-- Colorful painted houses: adjacent rectangles -->
