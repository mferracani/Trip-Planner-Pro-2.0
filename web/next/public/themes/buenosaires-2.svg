  <rect x="280" y="106" width="100" height="4" fill="#D05010"/>
  <rect x="280" y="112" width="100" height="4" fill="#B04010"/>
  <!-- Windows on houses -->
  <rect x="38" y="115" width="15" height="18" fill="#88AACC" opacity="0.5"/>
  <rect x="100" y="105" width="15" height="18" fill="#88AACC" opacity="0.5"/>
  <rect x="165" y="120" width="15" height="18" fill="#88AACC" opacity="0.5"/>
