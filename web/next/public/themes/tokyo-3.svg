<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="tokyo3_sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#08021A"/><stop offset="55%" stop-color="#C05030"/><stop offset="100%" stop-color="#FF9040"/></linearGradient>
    <linearGradient id="tokyo3_water" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#040818"/><stop offset="100%" stop-color="#020510"/></linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#tokyo3_sky)"/>
  <!-- Calm water -->
  <rect x="0" y="165" width="400" height="85" fill="url(#tokyo3_water)"/>
  <!-- Orange reflection on water -->
  <rect x="155" y="168" width="90" height="80" fill="#FF9040" opacity="0.14"/>
  <rect x="170" y="168" width="60" height="80" fill="#FF6020" opacity="0.10"/>
  <!-- Torii gate in water: two vertical posts + horizontal lintel beams -->
  <!-- Left post -->
  <rect x="163" y="100" width="12" height="120" fill="#CC2200"/>
  <!-- Right post -->
  <rect x="225" y="100" width="12" height="120" fill="#CC2200"/>
  <!-- Top lintel (kashigi) - slightly curved look via transform -->
  <rect x="152" y="95" width="96" height="12" fill="#CC2200"/>
  <!-- Top cap slight overhang -->
  <rect x="148" y="88" width="104" height="10" fill="#CC2200"/>
  <!-- Nuki (lower crossbeam) -->
  <rect x="158" y="118" width="84" height="8" fill="#CC2200"/>
  <!-- Reflection of torii in water -->
  <rect x="163" y="165" width="12" height="50" fill="#CC2200" opacity="0.3"/>
  <rect x="225" y="165" width="12" height="50" fill="#CC2200" opacity="0.3"/>
  <rect x="152" y="165" width="96" height="6" fill="#CC2200" opacity="0.25"/>
  <!-- Stars faint in upper sky -->
  <circle cx="50" cy="15" r="1" fill="white" opacity="0.35"/>
  <circle cx="320" cy="12" r="1" fill="white" opacity="0.30"/>
  <circle cx="100" cy="28" r="1" fill="white" opacity="0.25"/>
</svg>
