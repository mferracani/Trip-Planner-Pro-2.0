<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="ocean3_sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3A0808"/><stop offset="55%" stop-color="#E06020"/><stop offset="100%" stop-color="#F0C040"/></linearGradient>
    <linearGradient id="ocean3_water" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#180808"/><stop offset="100%" stop-color="#0E0404"/></linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#ocean3_sky)"/>
  <!-- Horizon line -->
  <rect x="0" y="145" width="400" height="105" fill="url(#ocean3_water)"/>
  <!-- Golden reflection stripe on water -->
  <rect x="155" y="148" width="90" height="100" fill="#F0A820" opacity="0.18"/>
  <rect x="170" y="148" width="60" height="100" fill="#F0C040" opacity="0.10"/>
  <!-- Sailboat: hull + mast + sail -->
  <polygon points="185,138 215,138 210,145 190,145" fill="#0A0404"/>
  <line x1="200" y1="138" x2="200" y2="108" stroke="#0A0404" stroke-width="1.5"/>
  <polygon points="200,108 200,136 220,136" fill="#E8B040" opacity="0.85"/>
  <!-- Stars faint in upper sky -->
  <circle cx="50" cy="20" r="1" fill="white" opacity="0.4"/>
  <circle cx="340" cy="15" r="1" fill="white" opacity="0.35"/>
  <circle cx="120" cy="30" r="1" fill="white" opacity="0.3"/>
</svg>
