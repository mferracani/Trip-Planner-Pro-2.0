  <ellipse cx="140" cy="215" rx="4" ry="2.5" fill="#E8900A" opacity="0.6" transform="rotate(-15 140 215)"/>
  <ellipse cx="230" cy="210" rx="5" ry="3" fill="#A82010" opacity="0.7" transform="rotate(35 230 210)"/>
  <ellipse cx="310" cy="220" rx="4" ry="2.5" fill="#D4600A" opacity="0.6" transform="rotate(-25 310 220)"/>
  <ellipse cx="370" cy="212" rx="5" ry="3" fill="#E8900A" opacity="0.5" transform="rotate(10 370 212)"/>
  <ellipse cx="195" cy="225" rx="4" ry="2" fill="#A82010" opacity="0.6" transform="rotate(-40 195 225)"/>
</svg>
