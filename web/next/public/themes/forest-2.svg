<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="forest2_sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3A1200"/><stop offset="100%" stop-color="#C05010"/></linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#forest2_sky)"/>
  <!-- Background trees -->
  <polygon points="20,200 36,145 52,200" fill="#A82010" opacity="0.6"/>
  <polygon points="55,200 72,138 89,200" fill="#D4600A" opacity="0.6"/>
  <polygon points="90,200 108,150 126,200" fill="#E8900A" opacity="0.6"/>
  <polygon points="310,200 328,145 346,200" fill="#A82010" opacity="0.6"/>
  <polygon points="345,200 362,140 379,200" fill="#D4600A" opacity="0.6"/>
  <!-- Main foreground trees -->
  <polygon points="60,200 82,120 104,200" fill="#D4600A"/>
  <polygon points="110,200 135,108 160,200" fill="#E8900A"/>
  <polygon points="165,200 190,95 215,200" fill="#A82010"/>
  <polygon points="220,200 245,110 270,200" fill="#D4600A"/>
  <polygon points="275,200 298,118 321,200" fill="#E8900A"/>
