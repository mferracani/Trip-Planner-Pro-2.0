<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="cold4_sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#020C18"/><stop offset="100%" stop-color="#0A1E30"/></linearGradient>
    <linearGradient id="cold4_aurora1" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#00FF88" stop-opacity="0"/><stop offset="40%" stop-color="#00FF88" stop-opacity="0.22"/><stop offset="70%" stop-color="#00BBFF" stop-opacity="0.18"/><stop offset="100%" stop-color="#00BBFF" stop-opacity="0"/></linearGradient>
    <linearGradient id="cold4_aurora2" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#8800FF" stop-opacity="0"/><stop offset="50%" stop-color="#8800FF" stop-opacity="0.16"/><stop offset="100%" stop-color="#8800FF" stop-opacity="0"/></linearGradient>
  </defs>
