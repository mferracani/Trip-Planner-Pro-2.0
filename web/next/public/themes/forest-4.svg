<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="forest4_sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0A2010"/><stop offset="100%" stop-color="#1A5020"/></linearGradient>
    <linearGradient id="forest4_beam" x1="0.5" y1="0" x2="0.5" y2="1"><stop offset="0%" stop-color="white" stop-opacity="0.22"/><stop offset="100%" stop-color="white" stop-opacity="0.0"/></linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#forest4_sky)"/>
  <!-- Dense tall trees - wider polygons for broad-leaf jungle -->
  <polygon points="0,250 25,110 50,250" fill="#1A7830"/>
  <polygon points="35,250 65,90 95,250" fill="#22A844"/>
  <polygon points="80,250 115,75 150,250" fill="#1A7830"/>
  <polygon points="130,250 165,85 200,250" fill="#1E8838"/>
  <polygon points="178,250 215,70 252,250" fill="#22A844"/>
  <polygon points="228,250 262,82 296,250" fill="#1A7830"/>
  <polygon points="278,250 312,88 346,250" fill="#1E8838"/>
  <polygon points="325,250 358,95 391,250" fill="#22A844"/>
  <polygon points="370,250 395,108 420,250" fill="#1A7830"/>
  <!-- Ground -->
  <rect x="0" y="235" width="400" height="15" fill="#0A1808"/>
  <!-- Light beam from top center -->
  <polygon points="175,0 225,0 260,250 140,250" fill="url(#forest4_beam)"/>
</svg>
