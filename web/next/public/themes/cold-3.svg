  <line x1="200" y1="200" x2="270" y2="195" stroke="#6AA8CC" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="200" x2="165" y2="235" stroke="#6AA8CC" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="200" x2="240" y2="232" stroke="#6AA8CC" stroke-width="1" opacity="0.4"/>
