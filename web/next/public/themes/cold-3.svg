  <line x1="200" y1="200" x2="255" y2="168" stroke="#6AA8CC" stroke-width="1" opacity="0.55"/>
  <line x1="200" y1="200" x2="200" y2="155" stroke="#6AA8CC" stroke-width="1" opacity="0.5"/>
