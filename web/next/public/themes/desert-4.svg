<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="desert4_sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#020408"/><stop offset="100%" stop-color="#080C18"/></linearGradient>
    <linearGradient id="desert4_mw" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="white" stop-opacity="0.0"/><stop offset="40%" stop-color="white" stop-opacity="0.08"/><stop offset="60%" stop-color="white" stop-opacity="0.08"/><stop offset="100%" stop-color="white" stop-opacity="0.0"/></linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#desert4_sky)"/>
  <!-- Stars -->
  <circle cx="30" cy="20" r="1" fill="white" opacity="0.8"/>
  <circle cx="75" cy="10" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="140" cy="25" r="1" fill="white" opacity="0.9"/>
  <circle cx="210" cy="8" r="1" fill="white" opacity="0.6"/>
  <circle cx="280" cy="18" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="355" cy="12" r="1" fill="white" opacity="0.7"/>
  <circle cx="50" cy="45" r="1" fill="white" opacity="0.5"/>
  <circle cx="170" cy="50" r="1" fill="white" opacity="0.6"/>
  <circle cx="320" cy="40" r="1" fill="white" opacity="0.5"/>
  <!-- Milky way band: wide diagonal semi-transparent strip -->
  <polygon points="0,180 400,0 400,60 0,240" fill="url(#desert4_mw)"/>
  <!-- Moon -->
  <circle cx="350" cy="38" r="18" fill="#C8D8FF" opacity="0.9"/>
  <!-- Crescent: overlapping dark circle -->
  <circle cx="361" cy="33" r="16" fill="#020408"/>
  <!-- Ground sand -->
  <rect x="0" y="195" width="400" height="55" fill="#0A0808"/>
  <!-- Cactus left -->
  <rect x="55" y="148" width="10" height="48" fill="#0A0808"/>
  <rect x="38" y="163" width="18" height="8" fill="#0A0808"/>
  <rect x="38" y="163" width="8" height="20" fill="#0A0808" transform="translate(0 -12)"/>
  <!-- Cactus arm right side -->
  <rect x="65" y="162" width="18" height="8" fill="#0A0808"/>
  <rect x="75" y="150" width="8" height="22" fill="#0A0808"/>
  <!-- Cactus right -->
  <rect x="320" y="155" width="10" height="42" fill="#0A0808"/>
  <rect x="303" y="170" width="18" height="8" fill="#0A0808"/>
  <rect x="303" y="158" width="8" height="22" fill="#0A0808"/>
</svg>
