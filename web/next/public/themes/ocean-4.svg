<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="ocean4_sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0066AA"/><stop offset="100%" stop-color="#55AADD"/></linearGradient>
    <linearGradient id="ocean4_sea" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#00CCDD"/><stop offset="100%" stop-color="#00AABB"/></linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#ocean4_sky)"/>
  <!-- Water -->
  <rect x="0" y="120" width="400" height="130" fill="url(#ocean4_sea)"/>
  <!-- Horizon -->
  <rect x="0" y="118" width="400" height="5" fill="#00BBCC" opacity="0.6"/>
  <!-- Coral reef suggestion at bottom -->
  <ellipse cx="80" cy="240" rx="40" ry="15" fill="#8B4513" opacity="0.65"/>
  <ellipse cx="160" cy="245" rx="30" ry="12" fill="#A0522D" opacity="0.60"/>
  <ellipse cx="260" cy="242" rx="35" ry="13" fill="#8B4513" opacity="0.65"/>
  <ellipse cx="340" cy="238" rx="28" ry="11" fill="#CD853F" opacity="0.55"/>
  <ellipse cx="200" cy="248" rx="22" ry="9" fill="#A0522D" opacity="0.50"/>
  <!-- Sun shimmer on water: diagonal white lines -->
  <line x1="120" y1="125" x2="160" y2="250" stroke="white" stroke-width="1" opacity="0.14"/>
  <line x1="160" y1="122" x2="200" y2="250" stroke="white" stroke-width="1" opacity="0.12"/>
  <line x1="200" y1="123" x2="240" y2="250" stroke="white" stroke-width="1" opacity="0.14"/>
  <line x1="240" y1="122" x2="280" y2="250" stroke="white" stroke-width="1" opacity="0.12"/>
  <line x1="280" y1="124" x2="315" y2="250" stroke="white" stroke-width="1" opacity="0.10"/>
  <!-- Small waves on surface -->
  <path d="M0 140 C60 135 130 145 200 138 C270 131 340 142 400 136" stroke="white" stroke-width="1" fill="none" opacity="0.30"/>
  <path d="M0 158 C70 153 150 163 230 156 C305 149 360 160 400 154" stroke="white" stroke-width="1" fill="none" opacity="0.22"/>
</svg>
