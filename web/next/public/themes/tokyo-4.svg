<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <rect width="400" height="250" fill="#020408"/>
  <!-- Ground with crosswalk -->
  <rect x="0" y="200" width="400" height="50" fill="#0A0C10"/>
  <!-- Wide geometric crosswalk: alternating white and dark rects -->
  <rect x="80" y="200" width="18" height="50" fill="#EEEEEE" opacity="0.85"/>
  <rect x="116" y="200" width="18" height="50" fill="#EEEEEE" opacity="0.85"/>
  <rect x="152" y="200" width="18" height="50" fill="#EEEEEE" opacity="0.85"/>
  <rect x="188" y="200" width="18" height="50" fill="#EEEEEE" opacity="0.85"/>
  <rect x="224" y="200" width="18" height="50" fill="#EEEEEE" opacity="0.85"/>
  <rect x="260" y="200" width="18" height="50" fill="#EEEEEE" opacity="0.85"/>
  <rect x="296" y="200" width="18" height="50" fill="#EEEEEE" opacity="0.85"/>
  <!-- Surrounding buildings -->
  <rect x="0" y="50" width="40" height="155" fill="#050C18"/>
  <rect x="35" y="70" width="35" height="135" fill="#040810"/>
  <rect x="65" y="35" width="30" height="170" fill="#050C18"/>
  <rect x="290" y="40" width="38" height="165" fill="#050C18"/>
  <rect x="323" y="62" width="30" height="143" fill="#040810"/>
  <rect x="348" y="30" width="52" height="175" fill="#050C18"/>
  <!-- Top buildings -->
  <rect x="100" y="0" width="200" height="65" fill="#040810"/>
  <!-- Lit windows -->
  <rect x="8" y="65" width="5" height="4" fill="#FFE566" opacity="0.8"/>
  <rect x="15" y="80" width="5" height="4" fill="#FFE566" opacity="0.7"/>
  <rect x="72" y="48" width="4" height="4" fill="#88AACC" opacity="0.7"/>
  <rect x="355" y="45" width="5" height="4" fill="#FFE566" opacity="0.8"/>
  <rect x="362" y="60" width="5" height="4" fill="#FFE566" opacity="0.7"/>
  <rect x="330" y="75" width="4" height="4" fill="#88AACC" opacity="0.65"/>
  <rect x="110" y="12" width="5" height="4" fill="#FFE566" opacity="0.75"/>
  <rect x="200" y="8" width="5" height="4" fill="#FFE566" opacity="0.8"/>
  <rect x="280" y="15" width="5" height="4" fill="#FFE566" opacity="0.75"/>
  <!-- Crowd on crosswalk: short vertical lines scattered -->
  <line x1="110" y1="202" x2="110" y2="215" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="170" y1="205" x2="170" y2="218" stroke="white" stroke-width="2" opacity="0.45"/>
  <line x1="200" y1="202" x2="200" y2="215" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="235" y1="208" x2="235" y2="220" stroke="white" stroke-width="2" opacity="0.45"/>
  <line x1="270" y1="203" x2="270" y2="216" stroke="white" stroke-width="2" opacity="0.5"/>
  <!-- Traffic lights stacked: red, yellow, green -->
  <rect x="75" y="155" width="10" height="35" fill="#1A1A1A"/>
  <circle cx="80" cy="162" r="4" fill="#FF4040" opacity="0.9"/>
  <circle cx="80" cy="172" r="4" fill="#FFCC00" opacity="0.6"/>
  <circle cx="80" cy="182" r="4" fill="#40CC40" opacity="0.5"/>
  <rect x="315" y="155" width="10" height="35" fill="#1A1A1A"/>
  <circle cx="320" cy="162" r="4" fill="#FF4040" opacity="0.9"/>
  <circle cx="320" cy="172" r="4" fill="#FFCC00" opacity="0.5"/>
  <circle cx="320" cy="182" r="4" fill="#40CC40" opacity="0.6"/>
</svg>
