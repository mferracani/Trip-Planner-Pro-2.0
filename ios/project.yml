name: TripPlannerPro
options:
  bundleIdPrefix: com.mferracani
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  developmentLanguage: es-AR
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: Q2TG5FA7M7
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
  SwiftKeychainWrapper:
    url: https://github.com/jrendel/SwiftKeychainWrapper
    from: "4.0.1"

targets:
  TripPlannerPro:
    type: application
    platform: iOS
    sources:
      - path: TripPlannerPro
        excludes:
          - "**/*.md"
    resources:
      - path: TripPlannerPro/Resources
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mferracani.tripplannerpro
        PRODUCT_NAME: Trip Planner Pro
        INFOPLIST_FILE: TripPlannerPro/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: TripPlannerPro/Resources/TripPlannerPro.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseStorage
      - package: Firebase
        product: FirebaseFunctions
      - package: SwiftKeychainWrapper
